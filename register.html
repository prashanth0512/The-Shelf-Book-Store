<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Shelf</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">
</head>

<body class="auth-page auth-page-register fade-in-up">
    <div class="auth-top-actions">
        <button id="rtl-toggle" class="theme-toggle-btn" title="Toggle RTL">RTL</button>
        <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">☀️</button>
    </div>
    <div class="auth-container auth-container-wide">
        <div class="auth-header">
            <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:0.75rem;">
                <i class="fas fa-book-open" style="font-size:2rem;color:var(--primary);"></i>
                <a href="index.html" class="logo auth-logo" style="margin-bottom:0;">The Shelf</a>
            </div>
            <p class="text-muted auth-subtitle">Create your Guild profile to reserve tables, order online, and track
                your library history.</p>
        </div>

        <form action="login.html">
            <h3 class="register-section-title">Account Information</h3>
            <div class="form-grid">
                <div>
                    <label class="register-label">First Name *</label>
                    <input type="text" class="form-control" placeholder="Jane" required>
                </div>
                <div>
                    <label class="register-label">Last Name *</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
                <div class="form-grid-full">
                    <label class="register-label">Email Address *</label>
                    <input type="email" class="form-control" placeholder="jane@domain.com" required>
                </div>
                <div>
                    <label class="register-label">Password *</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div>
                    <label class="register-label">Confirm Password *</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="register-terms">
                <label class="register-terms-label">
                    <input type="checkbox" required class="register-terms-checkbox">
                    <span>I confirm that all provided information is accurate, and I agree to the <a href="#"
                            class="register-terms-link">Cafe Aroma Terms of Service</a> and <a href="#"
                            class="register-terms-link">Privacy Policy</a>.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-submit">Complete Registration</button>
        </form>

        <p class="auth-footer auth-footer-register">Already part of the Guild? <a href="login.html"
                class="auth-link auth-link-underline">Log in here</a></p>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
